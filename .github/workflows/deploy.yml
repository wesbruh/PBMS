name: CI/CD Github Actions Deploy & Tests Workflow For PBMS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
          node-version: 24
    - run: npm ci
    - run: npm run lint || true   # adding 'true' will output the lint errors for the project in github, but will not halt the process of deployment. most of this is dead/unused code anyways

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:frontend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run test:backend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      
  deploy:
    name: Deploy to Render
    needs: [build]
    runs-on: ubuntu-latest
    # Only deploy if pushing to main (prevents deploys on every PR commit)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Backend Service
        uses: JorgeLNJunior/render-deploy@v1.4.4
        with:
          service_id: ${{ secrets.RENDER_BACKEND_SERVICE_ID }} 
          api_key: ${{ secrets.RENDER_API_KEY }}             
          wait_for_success: true

      - name: Deploy Frontend Service
        uses: JorgeLNJunior/render-deploy@v1.4.4
        with:
          service_id: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }} 
          api_key: ${{ secrets.RENDER_API_KEY }}
          wait_for_success: true

